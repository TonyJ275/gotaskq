services:
  postgres:
    image: postgres:17
    container_name: gotaskq-postgres
    restart: always
    environment:
      POSTGRES_DB: gotaskq
      POSTGRES_USER: gotaskq_user
      POSTGRES_PASSWORD: gotaskq_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotaskq_user -d gotaskq"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: