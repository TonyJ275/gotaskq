services:
  app:
    build: .
    container_name: gotaskq-app
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://gotaskq_user:gotaskq_pass@postgres:5432/gotaskq?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: gotaskq-postgres
    restart: always
    environment:
      POSTGRES_DB: gotaskq
      POSTGRES_USER: gotaskq_user
      POSTGRES_PASSWORD: gotaskq_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotaskq_user -d gotaskq"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: gotaskq-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data: